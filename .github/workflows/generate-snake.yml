name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wkratos77
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=7aa2f7&color_dots=#24283b,#414868,#565f89,#7aa2f7,#bb9af7
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=bb9af7&color_dots=#24283b,#414868,#565f89,#7aa2f7,#bb9af7

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
